<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Wheelie Good Weather</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🏍️ Wheelie Good Weather</h1>
      <p class="subtitle">Is it a riding day?</p>
    </header>

    <section class="search-section">
      <div class="city-search-wrapper">
        <input type="text" id="city-input" placeholder="Search city or town..." autocomplete="off" autocorrect="off" autocapitalize="off">
        <button id="search-btn" type="button">🔍</button>
      </div>
      <div id="search-results" class="search-results hidden"></div>
      <div id="selected-location" class="selected-location hidden">
        <span id="location-name"></span>
        <button id="change-btn" class="change-btn" type="button">Change</button>
      </div>
    </section>

    <button id="settings-toggle" class="settings-toggle" type="button">⚙️ Preferences</button>
    
    <div id="settings-panel" class="settings-panel hidden">
      <h3>What's YOUR good weather?</h3>
      <p class="settings-desc">Set your riding thresholds. These affect the verdict.</p>
      
      <div class="setting-group">
        <label for="min-temp">Min Temperature (°C)</label>
        <input type="number" id="min-temp" min="-20" max="30" value="10">
      </div>

      <div class="setting-group">
        <label for="max-temp">Max Temperature (°C)</label>
        <input type="number" id="max-temp" min="20" max="50" value="35">
      </div>

      <div class="setting-group">
        <label for="max-rain">Max Rain Chance (%)</label>
        <input type="number" id="max-rain" min="0" max="100" value="20">
      </div>

      <div class="setting-group">
        <label for="max-wind">Max Wind Speed (km/h)</label>
        <input type="number" id="max-wind" min="10" max="100" value="40">
      </div>

      <div class="setting-group">
        <label for="rain-tolerance">Rain Tolerance (%)</label>
        <input type="number" id="rain-tolerance" min="0" max="50" value="0">
        <small>Subtracted from rain probability before scoring</small>
      </div>

      <button id="save-prefs-btn" class="save-btn" type="button">Save Preferences</button>
    </div>

    <button id="check-btn" class="check-btn" type="button" disabled>Select a location first</button>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Checking the skies...</p>
    </div>

    <div id="result" class="result hidden">
      <div id="verdict" class="verdict"></div>
      
      <div id="best-window" class="best-window"></div>

      <div class="sources">
        <small>Consensus from: <span id="sources-list"></span></small>
      </div>

      <div class="hourly-section">
        <h2>Hourly Forecast</h2>
        <div id="hourly-forecast" class="hourly-grid"></div>
      </div>
    </div>

    <div id="error" class="error hidden"></div>

    <footer>
      <p>No more weather app hopping. Just ride.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
